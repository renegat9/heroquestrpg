# docker/nginx/default.conf — reverse proxy du projet
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # SPA Vue + routes Laravel : tout ce qui n'est pas un fichier passe par index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP → conteneur app (PHP-FPM sur 9000)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;   # marge pour les requêtes qui attendent un job
    }

    # Assets buildés (Vite build) : cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    # NOTE WebSocket : les clients Echo se connectent directement à reverb:8080
    # (port publié dans le compose), pas via ce proxy. Si un jour tu veux tout
    # passer par le port 80/443 (utile en WAN derrière TLS), ajoute :
    #
    # location /app/ {
    #     proxy_pass http://reverb:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_read_timeout 3600s;   # connexions WS longues
    # }
}
